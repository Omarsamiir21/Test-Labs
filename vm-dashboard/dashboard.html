<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VM Health Dashboard</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --text:      #e2e8f0;
      --muted:     #8892a4;
      --green:     #22c55e;
      --yellow:    #eab308;
      --red:       #ef4444;
      --blue:      #3b82f6;
      --accent:    #6366f1;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 0.9rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    #refresh-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Summary bar ───────────────────────────────────────────────────────── */
    .summary-bar {
      display: flex;
      gap: 1rem;
      padding: 1.25rem 2rem;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      min-width: 130px;
      flex: 1;
    }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.online  { color: var(--green); }
    .stat-value.offline { color: var(--red); }
    .stat-value.total   { color: var(--blue); }

    /* ── VM grid ───────────────────────────────────────────────────────────── */
    #vm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1rem;
      padding: 0 2rem 2rem;
    }

    .vm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.2s;
    }

    .vm-card:hover { border-color: var(--accent); }
    .vm-card.offline { opacity: 0.6; }

    /* ── Card header ───────────────────────────────────────────────────────── */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .vm-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .vm-ip {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .vm-os {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .status-badge {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .status-badge.online  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .status-badge.offline { background: rgba(239,68,68,0.15);   color: var(--red);   }

    /* ── Metrics section ───────────────────────────────────────────────────── */
    .metrics { display: flex; flex-direction: column; gap: 0.65rem; }

    .metric-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .metric-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
    }

    .metric-name { color: var(--muted); }
    .metric-val  { color: var(--text); font-weight: 500; }

    .bar-track {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .bar-fill.green  { background: var(--green); }
    .bar-fill.yellow { background: var(--yellow); }
    .bar-fill.red    { background: var(--red); }

    /* ── Footer row ────────────────────────────────────────────────────────── */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .uptime-label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .uptime-val {
      font-size: 0.8rem;
      color: var(--text);
    }

    .last-seen {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    /* ── Services tags ─────────────────────────────────────────────────────── */
    .services {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .svc-tag {
      font-size: 0.68rem;
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.3);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    /* ── Empty / error states ──────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state p { margin-top: 0.5rem; font-size: 0.85rem; }

    /* ── Security audit button & status ───────────────────────────────────── */
    .audit-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-top: 0.25rem;
      border-top: 1px solid var(--border);
    }

    .audit-info {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .btn-audit {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .btn-audit:disabled { opacity: 0.6; cursor: default; }

    .btn-audit.idle    { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.4); }
    .btn-audit.running { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.35); }
    .btn-audit.ready   { background: rgba(34,197,94,0.15); color: var(--green);  border: 1px solid rgba(34,197,94,0.35); }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid rgba(234,179,8,0.3);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header         { padding: 0.75rem 1rem; }
      .summary-bar   { padding: 1rem; }
      #vm-grid       { padding: 0 1rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    VM Health Dashboard
  </div>
  <div class="header-right">
    <div id="refresh-indicator">
      <div class="pulse-dot"></div>
      <span>Live · refreshes every 10s</span>
    </div>
    <span id="last-updated">—</span>
  </div>
</header>

<div class="summary-bar">
  <div class="stat-card">
    <div class="stat-label">Total VMs</div>
    <div class="stat-value total" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Online</div>
    <div class="stat-value online" id="stat-online">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Offline</div>
    <div class="stat-value offline" id="stat-offline">—</div>
  </div>
</div>

<div id="vm-grid">
  <div class="empty-state">
    <strong>Loading VM data…</strong>
    <p>Waiting for agents to report in.</p>
  </div>
</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────────
  function barColor(pct) {
    if (pct < 60) return 'green';
    if (pct < 80) return 'yellow';
    return 'red';
  }

  function formatBytes(mb) {
    if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
    return mb + ' MB';
  }

  function timeAgo(isoString) {
    const diff = Math.floor((Date.now() - new Date(isoString).getTime()) / 1000);
    if (diff < 5)   return 'just now';
    if (diff < 60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    return `${Math.floor(diff / 3600)}h ago`;
  }

  // ── Render a single VM card ───────────────────────────────────────────────
  function renderCard(vm) {
    const status   = vm.online ? 'online' : 'offline';
    const cpuPct   = parseFloat(vm.cpu_pct  ?? 0);
    const ramPct   = parseFloat(vm.ram_pct  ?? 0);
    const diskPct  = parseFloat(vm.disk_pct ?? 0);

    const services = (vm.services ?? []).map(s =>
      `<span class="svc-tag">${s}</span>`
    ).join('') || '<span style="color:var(--muted);font-size:0.72rem">none detected</span>';

    return `
      <div class="vm-card ${status}">
        <div class="card-header">
          <div>
            <div class="vm-name">${vm.hostname ?? 'Unknown'}</div>
            <div class="vm-ip">${vm.ip ?? '—'}</div>
            <div class="vm-os">${vm.os ?? ''}</div>
          </div>
          <span class="status-badge ${status}">${status}</span>
        </div>

        <div class="metrics">
          <div class="metric-row">
            <div class="metric-label-row">
              <span class="metric-name">CPU</span>
              <span class="metric-val">${cpuPct.toFixed(1)}%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill ${barColor(cpuPct)}" style="width:${Math.min(cpuPct,100)}%"></div>
            </div>
          </div>

          <div class="metric-row">
            <div class="metric-label-row">
              <span class="metric-name">RAM</span>
              <span class="metric-val">
                ${formatBytes(vm.ram_used_mb ?? 0)} / ${formatBytes(vm.ram_total_mb ?? 0)}
                &nbsp;(${ramPct.toFixed(1)}%)
              </span>
            </div>
            <div class="bar-track">
              <div class="bar-fill ${barColor(ramPct)}" style="width:${Math.min(ramPct,100)}%"></div>
            </div>
          </div>

          <div class="metric-row">
            <div class="metric-label-row">
              <span class="metric-name">Disk</span>
              <span class="metric-val">
                ${formatBytes(vm.disk_used_mb ?? 0)} / ${formatBytes(vm.disk_total_mb ?? 0)}
                &nbsp;(${diskPct.toFixed(1)}%)
              </span>
            </div>
            <div class="bar-track">
              <div class="bar-fill ${barColor(diskPct)}" style="width:${Math.min(diskPct,100)}%"></div>
            </div>
          </div>
        </div>

        <div class="services">${services}</div>

        <div class="card-footer">
          <div>
            <div class="uptime-label">Uptime</div>
            <div class="uptime-val">${vm.uptime ?? '—'}</div>
          </div>
          <div class="last-seen">Last seen<br>${timeAgo(vm.timestamp)}</div>
        </div>

        <div class="audit-section">
          ${auditFooterHtml(vm.hostname)}
        </div>
      </div>
    `;
  }

  // ── Security audit state ──────────────────────────────────────────────────
  // Maps hostname → { state: 'idle'|'running'|'ready', reportUrl, lastAudit }
  const auditState = {};

  function auditFooterHtml(hostname) {
    const s = auditState[hostname] || { state: 'idle' };

    let btnLabel, btnClass, btnDisabled, infoText;

    if (s.state === 'running') {
      btnLabel   = `<span class="spinner"></span>Audit Running…`;
      btnClass   = 'running';
      btnDisabled = 'disabled';
      infoText   = 'Checking every 10s…';
    } else if (s.state === 'ready') {
      btnLabel   = '🔍 View Report';
      btnClass   = 'ready';
      btnDisabled = '';
      infoText   = s.lastAudit ? `Last audit: ${s.lastAudit}` : '';
    } else {
      btnLabel   = '🛡 Run Security Audit';
      btnClass   = 'idle';
      btnDisabled = '';
      infoText   = s.lastAudit ? `Last audit: ${s.lastAudit}` : 'No report yet';
    }

    const onclick = s.state === 'ready'
      ? `window.open('${s.reportUrl}', '_blank')`
      : `triggerAudit('${hostname}')`;

    return `
      <span class="audit-info">${infoText}</span>
      <button class="btn-audit ${btnClass}" ${btnDisabled} onclick="${onclick}">${btnLabel}</button>
    `;
  }

  // ── Fetch and render ──────────────────────────────────────────────────────
  async function refresh() {
    try {
      const res  = await fetch('/api/vms');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      document.getElementById('stat-total').textContent   = data.summary.total;
      document.getElementById('stat-online').textContent  = data.summary.online;
      document.getElementById('stat-offline').textContent = data.summary.offline;

      const grid = document.getElementById('vm-grid');
      if (data.vms.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <strong>No VMs reporting yet</strong>
            <p>Start <code>agent.sh</code> on your VMs to see data here.</p>
          </div>`;
      } else {
        // Sort: online first, then alphabetically
        data.vms.sort((a, b) => {
          if (a.online !== b.online) return b.online - a.online;
          return (a.hostname ?? '').localeCompare(b.hostname ?? '');
        });
        grid.innerHTML = data.vms.map(renderCard).join('');
      }

      const now = new Date();
      document.getElementById('last-updated').textContent =
        'Updated ' + now.toLocaleTimeString();

    } catch (err) {
      console.error('Refresh failed:', err);
      document.getElementById('last-updated').textContent = 'Update failed';
    }
  }

  // ── Trigger a security audit for one VM ──────────────────────────────────
  async function triggerAudit(hostname) {
    auditState[hostname] = { state: 'running' };
    // Re-render to show spinner immediately
    await refresh();

    try {
      const res = await fetch(`/api/trigger/${encodeURIComponent(hostname)}`, { method: 'POST' });
      if (!res.ok) {
        const body = await res.text();
        console.error(`Trigger failed for ${hostname}: ${body}`);
        auditState[hostname] = { state: 'idle', lastAudit: auditState[hostname]?.lastAudit };
        await refresh();
      }
      // On success, keep state as 'running'; polling will detect when report arrives
    } catch (err) {
      console.error('Trigger error:', err);
      auditState[hostname] = { state: 'idle', lastAudit: auditState[hostname]?.lastAudit };
      await refresh();
    }
  }

  // ── Poll /api/reports and update audit state ──────────────────────────────
  async function pollReports() {
    try {
      const res = await fetch('/api/reports');
      if (!res.ok) return;
      const { reports } = await res.json();

      // Build a map of hostname → latest report
      const latestByHost = {};
      for (const r of reports) {
        if (!latestByHost[r.hostname] || r.timestamp > latestByHost[r.hostname].timestamp) {
          latestByHost[r.hostname] = r;
        }
      }

      for (const [hostname, report] of Object.entries(latestByHost)) {
        const current = auditState[hostname];
        const formattedTime = report.timestamp
          ? new Date(report.timestamp).toLocaleString()
          : 'unknown';

        // If we were waiting for this host, mark it ready
        if (current?.state === 'running') {
          auditState[hostname] = {
            state:     'ready',
            reportUrl: report.url,
            lastAudit: formattedTime,
          };
        } else if (!current || current.state === 'idle') {
          // Pre-populate from existing reports so cards show last audit time on load
          auditState[hostname] = {
            state:     'ready',
            reportUrl: report.url,
            lastAudit: formattedTime,
          };
        }
      }
    } catch (err) {
      console.error('Report poll error:', err);
    }
  }

  // Initial load then poll every 10 s
  // Reports are polled on the same interval so the UI updates when an audit finishes.
  (async () => {
    await pollReports();
    await refresh();
  })();
  setInterval(async () => {
    await pollReports();
    await refresh();
  }, 10_000);
</script>
</body>
</html>
